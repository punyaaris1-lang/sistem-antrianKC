<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FC KARTIKA CHANDRA - SYSTEM</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#D4FF00">

    <script>
        const CURRENT_VERSION = "4.2_Persistence_ON"; 
        if (localStorage.getItem("app_version_system") !== CURRENT_VERSION) {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    for(let registration of registrations) { registration.unregister(); }
                });
            }
            if (window.caches) {
                caches.keys().then((keyList) => {
                    return Promise.all(keyList.map((key) => caches.delete(key)));
                });
            }
            localStorage.setItem("app_version_system", CURRENT_VERSION);
            window.location.reload(true);
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:ital,wght@0,700;0,900;1,700;1,900&family=Rajdhani:wght@500;600;700;800;900&family=Teko:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --kc-lime: #D4FF00; --bg-dark: #050505; --font-head: 'Orbitron', sans-serif; --font-tech: 'Rajdhani', sans-serif; }
        body { font-family: var(--font-tech); background: var(--bg-dark); color: #fff; margin: 0; padding: 0 0 110px 0; }
        .header { text-align: center; padding: 35px 0 15px; }
        .slot-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px; }
        .slot-card { background: #111; border: 1px solid #333; border-radius: 10px; padding: 15px; text-align: center; }
        .slot-card.active { border-color: var(--kc-lime); box-shadow: 0 0 10px rgba(212,255,0,0.2); }
        .btn-action { width: 100%; padding: 8px; border-radius: 5px; border: none; font-weight: 900; margin-top: 10px; cursor: pointer; }
        .btn-stop { background: #FF003C; color: #fff; }
        .btn-pilih { background: var(--kc-lime); color: #000; }
        .dock-container { position: fixed; bottom: 0; width: 100%; height: 80px; background: #000; display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: center; border-top: 1px solid #333; }
        .nav-item { text-decoration: none; color: #555; text-align: center; }
        .nav-item.active { color: var(--kc-lime); }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="font-family:var(--font-head); font-size:24px;">SYSTEM CONTROL</h1>
        <div style="color:var(--kc-lime); font-size:10px; letter-spacing:2px;">OPERATIONAL ACTIVE</div>
    </div>

    <div class="slot-container" id="slotsContainer"></div>

    <div class="dock-container">
        <a href="lokasifc.html" class="nav-item"><i class="fas fa-map"></i></a>
        <div class="nav-item active"><i class="fas fa-charging-station" style="font-size:24px;"></i></div>
        <a href="plan.html" class="nav-item"><i class="fas fa-route"></i></a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, runTransaction, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDfsTAGclYUSRe6YhiljS-xb-v-9RBYVEM",
            authDomain: "antriankcnew.firebaseapp.com",
            projectId: "antriankcnew",
            storageBucket: "antriankcnew.firebasestorage.app",
            messagingSenderId: "348986439499",
            appId: "1:348986439499:web:99578753dc9547d727dace"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        enableIndexedDbPersistence(db).catch(() => {});

        const mainRef = doc(db, "antrian", "utama");
        const myPlat = localStorage.getItem('myPlat');

        function cleanStr(s) { return s ? s.replace(/[^A-Z0-9]/gi, '').toUpperCase() : ''; }

        onSnapshot(mainRef, (snap) => {
            if(!snap.exists()) return;
            const d = snap.data();
            const slots = d.chargingSlots || [null,null,null,null,null];
            const q = d.waitingQueue || [];
            const container = document.getElementById('slotsContainer');
            container.innerHTML = '';

            slots.forEach((s, i) => {
                const div = document.createElement('div');
                div.className = s ? "slot-card active" : "slot-card";
                if(s) {
                    const isMe = cleanStr(s.plat) === cleanStr(myPlat);
                    div.innerHTML = `<div>SLOT 0${i+1}</div><div style="font-size:18px; margin:10px 0;">${s.plat}</div>${isMe ? `<button class="btn-action btn-stop" onclick="stop(${i})">STOP</button>` : `<button class="btn-action" style="background:#333; color:#777;" disabled>BUSY</button>`}`;
                } else {
                    const canPick = q.length > 0 && cleanStr(q[0].plat) === cleanStr(myPlat);
                    div.innerHTML = `<div>SLOT 0${i+1}</div><div style="color:#555; margin:10px 0;">OPEN</div><button class="btn-action btn-pilih" ${canPick ? `onclick="pick(${i})"` : 'disabled style="opacity:0.3"'}>PILIH</button>`;
                }
                container.appendChild(div);
            });
        });

        window.pick = async (i) => {
            await runTransaction(db, async (t) => {
                const d = (await t.get(mainRef)).data();
                let q = d.waitingQueue;
                if(cleanStr(q[0].plat) !== cleanStr(myPlat)) return;
                const me = q.shift();
                d.chargingSlots[i] = me;
                t.update(mainRef, { chargingSlots: d.chargingSlots, waitingQueue: q });
            });
        };

        window.stop = async (i) => {
            if(!confirm("Selesai ngecas?")) return;
            await runTransaction(db, async (t) => {
                const d = (await t.get(mainRef)).data();
                d.chargingSlots[i] = null;
                t.update(mainRef, { chargingSlots: d.chargingSlots });
            });
            localStorage.removeItem('myPlat');
            window.location.href = 'antrian.html';
        };
    </script>
</body>
</html>
