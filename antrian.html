<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FC KARTIKA CHANDRA - ANTRIAN SMART</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#D4FF00">

    <script>
        // VERSI 5.0: AKTIFKAN OFFLINE PERSISTENCE & FIX FILTER
        const CURRENT_VERSION = "5.0_Persistence_ON"; 
        if (localStorage.getItem("app_version") !== CURRENT_VERSION) {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    for(let registration of registrations) { registration.unregister(); }
                });
            }
            if (window.caches) {
                caches.keys().then((keyList) => {
                    return Promise.all(keyList.map((key) => caches.delete(key)));
                });
            }
            localStorage.setItem("app_version", CURRENT_VERSION);
            window.location.reload(true);
        }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:ital,wght@0,700;0,900;1,700;1,900&family=Rajdhani:wght@500;600;700;800;900&family=Teko:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --kc-lime: #D4FF00;       
            --kc-silver: #E2E8F0;
            --danger: #FF003C;
            --metal-dark: linear-gradient(145deg, #1A1D24 0%, #0D0F12 100%);
            --metal-light: linear-gradient(145deg, #2D333B 0%, #1E2229 100%);
            --carbon-bg: repeating-linear-gradient(45deg, #050608 0, #050608 2px, #0a0b0e 2px, #0a0b0e 6px);
            --border-metal: 1px solid rgba(255,255,255,0.08);
            --shadow-3d: 10px 10px 30px rgba(0,0,0,0.8), -2px -2px 10px rgba(255,255,255,0.03);
            --inner-bevel: inset 1px 1px 2px rgba(255,255,255,0.1), inset -1px -1px 2px rgba(0,0,0,0.5);
            --font-logo: 'Orbitron', sans-serif;
            --font-data: 'Rajdhani', sans-serif;
            --font-num: 'Teko', sans-serif;
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 0 0 110px 0; 
            font-family: var(--font-data); 
            background-color: #030405;
            background-image: 
                radial-gradient(circle at 100% 0%, rgba(212, 255, 0, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 0% 100%, rgba(255, 255, 255, 0.03) 0%, transparent 40%),
                var(--carbon-bg);
            color: #fff; overflow-x: hidden;
        }

        .hud-top { position: absolute; top: 15px; left: 20px; right: 20px; height: 1px; display: flex; justify-content: space-between; align-items: flex-end; z-index: 10; }
        .live-tag { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-data); font-size: 8px; color: var(--kc-lime); letter-spacing: 2px; }
        .live-tag i { color: var(--kc-lime); animation: blink 1s infinite; font-size: 6px; text-shadow: 0 0 5px var(--kc-lime);}

        .header-panel { padding: 40px 15px 15px; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 5; text-align: center; }
        .logo-ring { width: 110px; height: 110px; background: var(--metal-dark); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-3d); position: relative; border: var(--border-metal); }
        .logo-ring img { width: 65%; height: auto; position: relative; z-index: 2; filter: drop-shadow(0 0 5px rgba(212,255,0,0.5)); }
        .logo-ring::before { content: ''; position: absolute; inset: -5px; border-radius: 50%; border: 2px solid transparent; border-top-color: var(--kc-lime); border-right-color: var(--kc-lime); animation: spin 4s linear infinite; opacity: 0.5; }

        .brand-title { font-family: var(--font-logo); font-style: italic; font-weight: 900; font-size: clamp(22px, 7.5vw, 34px); color: #fff; letter-spacing: 1px; text-transform: uppercase; margin: 20px 0 0; }
        .brand-subtitle { font-family: var(--font-data); font-weight: 800; font-size: 11px; color: var(--kc-lime); letter-spacing: 4px; text-transform: uppercase; margin-top: 8px; }

        .dashboard-container { padding: 0 20px; margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; position: relative; z-index: 20;}
        .gauge-card { background: var(--metal-dark); border: var(--border-metal); border-radius: 12px; padding: 15px; position: relative; overflow: hidden; box-shadow: var(--shadow-3d); cursor: pointer; transition: 0.2s;}
        .gauge-card::before { content: ''; position: absolute; top: 0; left: 0; width: 30px; height: 3px; background: var(--kc-lime); box-shadow: 0 0 10px var(--kc-lime); }
        .gauge-lbl { font-family: var(--font-logo); font-style: italic; font-size: 10px; font-weight: 700; color: #FFFFFF; letter-spacing: 1px; display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
        .gauge-val-container { display: flex; align-items: baseline; gap: 5px; }
        .gauge-val { font-family: var(--font-num); font-size: 50px; font-weight: 600; color: #fff; line-height: 0.9; }
        .gauge-max { font-family: var(--font-data); font-weight: 700; font-size: 18px; color: #BBB; } 
        .progress-track { width: 100%; height: 4px; background: #111; border-radius: 2px; margin-top: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #7A9900, var(--kc-lime)); width: 0%; transition: width 0.5s;}

        .action-area { padding: 25px 20px 10px; }
        .btn-tactical { width: 100%; background: linear-gradient(180deg, #D4FF00 0%, #8DAA00 100%); border: none; color: #000; padding: 22px; font-family: var(--font-logo); font-style: italic; font-weight: 900; font-size: 22px; cursor: pointer; clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 50000; display: none; align-items: center; justify-content: center; opacity: 0; transition: 0.3s ease; }
        .modal-overlay.open { opacity: 1; } 
        .modal-tactical { background: var(--metal-dark); border: var(--border-metal); border-top: 4px solid var(--kc-lime); border-radius: 16px; width: 85%; max-width: 380px; padding: 25px; }
        .inp-box { width: 100%; padding: 14px; background: #0A0C0E; border: 1px solid rgba(255,255,255,0.1); color: #fff; font-family: var(--font-data); font-size: 18px; border-radius: 8px; margin-bottom: 15px; }

        .dock-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 85px; background: rgba(10, 12, 15, 0.95); border-top: 1px solid rgba(255,255,255,0.1); display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: center; z-index: 20000; }
        .nav-item { text-decoration: none; display: flex; flex-direction: column; align-items: center; color: #555; }
        .nav-item.active { color: var(--kc-lime); }
        .center-icon-box { width: 65px; height: 65px; background: var(--metal-light); border: 2px solid #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #fff; transform: translateY(-30px); }

        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="hud-top"><div class="live-tag"><span id="liveClock">SYNC...</span> <i class="fas fa-circle"></i></div></div>

    <div id="loading-screen" style="position:fixed; inset:0; background:#030405; z-index:99999; display:none; flex-direction:column; align-items:center; justify-content:center;">
        <img src="logo2.png" style="width:80px; animation: blink 1s infinite;">
        <div style="color:var(--kc-lime); margin-top:20px; font-family:var(--font-logo); font-style:italic; font-size:14px; letter-spacing:3px;">VERIFYING GPS...</div>
    </div>

    <div class="header-panel">
        <div class="logo-ring"><img src="logo2.png"></div>
        <h1 class="brand-title">FC KARTIKA CHANDRA</h1>
        <div class="brand-subtitle">MAKA LINTAS KARTIKA CHANDRA</div>
    </div>

    <div class="dashboard-container">
        <div class="gauge-card" onclick="openModal('slot')">
            <div class="gauge-lbl"><i class="fas fa-microchip"></i> SLOT SYSTEM</div>
            <div class="gauge-val-container"><div class="gauge-val" id="slotVal">00</div><div class="gauge-max">/05</div></div>
            <div class="progress-track"><div class="progress-fill" id="slotProgress"></div></div>
        </div>
        <div class="gauge-card" onclick="openModal('queue')">
            <div class="gauge-lbl"><i class="fas fa-users"></i> ANTRIAN</div>
            <div class="gauge-val-container"><div class="gauge-val" id="queueVal">00</div><div class="gauge-max">UNIT</div></div>
        </div>
    </div>

    <div class="action-area">
        <button id="btnDaftar" class="btn-tactical" onclick="checkLocationAndOpenForm()">DAFTAR ANTRIAN</button>
    </div>

    <div id="formModal" class="modal-overlay">
        <div class="modal-tactical">
            <h2 style="color:var(--kc-lime); font-family:var(--font-logo); font-style:italic; font-size:18px; margin-bottom:15px;">DATA PROTOKOL</h2>
            <input type="text" id="inpNama" class="inp-box" placeholder="NAMA PANGGILAN">
            <input type="text" id="inpPlat" class="inp-box" placeholder="B 1234 XYZ" style="text-transform:uppercase;">
            <input type="number" id="inpBatre" class="inp-box" placeholder="BATERE (%)">
            <button onclick="submitData()" id="btnSubmitForm" style="width:100%; padding:15px; background:var(--kc-lime); border:none; border-radius:8px; font-weight:900;">AMBIL TIKET</button>
            <button onclick="closeModal('formModal')" style="width:100%; margin-top:10px; background:transparent; border:1px solid #555; color:#aaa; padding:12px; border-radius:8px;">BATAL</button>
        </div>
    </div>

    <div id="successModal" class="modal-overlay">
        <div class="modal-tactical" style="text-align:center;">
            <i class="fas fa-check-circle" style="font-size:50px; color:var(--kc-lime); margin-bottom:15px;"></i>
            <h2 style="color:var(--kc-lime); font-family:var(--font-logo); font-style:italic;">BERHASIL!</h2>
            <div id="succMsg" style="margin-bottom:20px;"></div>
            <button onclick="window.location.href='system.html'" style="width:100%; padding:15px; background:var(--kc-lime); border:none; border-radius:8px; font-weight:900;">SIAP LAKSANAKAN</button>
        </div>
    </div>

    <div class="dock-container">
        <a href="lokasifc.html" class="nav-item"><i class="fas fa-map-marked-alt"></i><span style="font-size:9px;">PETA</span></a>
        <div class="nav-item active"><div class="center-icon-box"><i class="fas fa-qrcode"></i></div><span style="font-size:9px; margin-top:-20px;">ANTRIAN</span></div>
        <a href="plan.html" class="nav-item"><i class="fas fa-route"></i><span style="font-size:9px;">PLAN</span></a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, getDoc, runTransaction, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDfsTAGclYUSRe6YhiljS-xb-v-9RBYVEM",
            authDomain: "antriankcnew.firebaseapp.com",
            projectId: "antriankcnew",
            storageBucket: "antriankcnew.firebasestorage.app",
            messagingSenderId: "348986439499",
            appId: "1:348986439499:web:99578753dc9547d727dace"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // JURUS ANTI-BOCOR (PERSISTENCE)
        enableIndexedDbPersistence(db).catch((err) => {
            console.log("Persistence error:", err.code);
        });

        const mainRef = doc(db, "antrian", "utama");

        // FUNGSI BERSIH PLAT
        function cleanStr(s) { return s ? s.replace(/[^A-Z0-9]/gi, '').toUpperCase() : ''; }

        // FUNGSI FILTER NAMA PINTAR
        function validasiNama(nama) {
            let text = nama.trim();
            if (text.length < 3) return { valid: false, pesan: "Minimal 3 huruf!" };
            let kataTerlarang = ['anjing', 'babi', 'monyet', 'bangsat', 'tolol', 'goblok', 'kontol', 'memek'];
            let kataInput = text.toLowerCase().split(/\s+/);
            for (let k of kataInput) { if (kataTerlarang.includes(k)) return { valid: false, pesan: "Gunakan nama sopan!" }; }
            return { valid: true };
        }

        window.openModal = (id) => { document.getElementById(id).style.display = 'flex'; setTimeout(() => document.getElementById(id).classList.add('open'), 10); };
        window.closeModal = (id) => { document.getElementById(id).classList.remove('open'); setTimeout(() => document.getElementById(id).style.display = 'none', 300); };

        window.checkLocationAndOpenForm = () => {
            if(localStorage.getItem('myPlat')) { window.location.href = 'system.html'; return; }
            navigator.geolocation.getCurrentPosition((pos) => {
                const dist = calculateDistance(-6.2285953, 106.819502, pos.coords.latitude, pos.coords.longitude);
                if (dist <= 0.07) openModal('formModal');
                else alert(`Masih Jauh Bos! Jarak: ${(dist*1000).toFixed(0)}m`);
            }, () => alert("GPS ERROR!"), { enableHighAccuracy: true });
        };

        window.submitData = async () => {
            const name = document.getElementById('inpNama').value;
            const plat = document.getElementById('inpPlat').value.toUpperCase();
            const bat = document.getElementById('inpBatre').value;
            
            const cek = validasiNama(name);
            if(!cek.valid) return alert(cek.pesan);

            document.getElementById('btnSubmitForm').innerText = "SYNCING...";
            
            try {
                const result = await runTransaction(db, async (t) => {
                    const d = (await t.get(mainRef)).data() || {};
                    if([...(d.chargingSlots||[]), ...(d.waitingQueue||[])].some(u => u && cleanStr(u.plat) === cleanStr(plat))) return { status: 'DUP' };

                    let slots = d.chargingSlots || [null,null,null,null,null];
                    let q = d.waitingQueue || [];
                    const ticket = (d.lastTicket || 0) + 1;
                    q.push({ userName: name.toUpperCase(), plat: plat, batreSisa: bat, timestamp: Date.now(), qNo: ticket });
                    t.update(mainRef, { waitingQueue: q, lastTicket: ticket });
                    return { status: 'OK', ticket: ticket };
                });

                if(result.status === 'DUP') window.location.href = 'system.html';
                else {
                    localStorage.setItem('myPlat', plat);
                    document.getElementById('succMsg').innerHTML = `Antrean Berhasil!<br>Nomor Tiket: <b>#${result.ticket}</b>`;
                    closeModal('formModal');
                    openModal('successModal');
                }
            } catch(e) { alert("Error!"); }
        };

        onSnapshot(mainRef, (snap) => {
            if(!snap.exists()) return;
            const d = snap.data();
            let used = 0;
            (d.chargingSlots || []).forEach(s => { if(s) used++; });
            document.getElementById('slotVal').innerText = `0${used}`;
            document.getElementById('slotProgress').style.width = `${(used/5)*100}%`;
            document.getElementById('queueVal').innerText = String((d.waitingQueue || []).length).padStart(2, '0');
            
            const myPlat = localStorage.getItem('myPlat');
            const btn = document.getElementById('btnDaftar');
            if(myPlat && ([...(d.waitingQueue||[]), ...(d.chargingSlots||[])].some(u => u && cleanStr(u.plat) === cleanStr(myPlat)))) {
                btn.innerHTML = 'AKSES SYSTEM'; btn.style.background = "#1E2229"; btn.style.color = "#fff";
            }
        });

        function calculateDistance(lat1,lon1,lat2,lon2){const p=0.01745329,c=Math.cos,a=0.5-c((lat2-lat1)*p)/2+c(lat1*p)*c(lat2*p)*(1-c((lon2-lon1)*p))/2;return 12742*Math.asin(Math.sqrt(a))}
        setInterval(() => { const d = new Date(); document.getElementById('liveClock').innerText = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }, 1000);
    </script>
</body>
</html>
